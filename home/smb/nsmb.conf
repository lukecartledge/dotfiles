# /etc/nsmb.conf -- managed by ~/.dotfiles/home/smb
#
# Disable SMB multichannel on macOS Tahoe 26.5.x.
#
# WHY: smbfs.kext <-> Wi-Fi driver hang under sustained SMB load when
# multichannel is active. Disabling forces single-channel SMB which the
# kext handles fine. Without this, bulk transfers (~5 GB+) freeze the
# system network stack within ~60s and require Wi-Fi toggle to recover.
#
# Diagnosis: ~/notes/brain/20-work/sessions/2026/06/2026-06-12-wifi-smb-tahoe-bug-dead-end.md
#
# REVISIT: when Apple ships an smbfs/multichannel fix, this file can be
# removed (or this knob may become unnecessary).

[default]
mc_on=no
